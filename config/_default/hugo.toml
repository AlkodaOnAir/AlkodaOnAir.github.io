title = "Alkoda On Air"
baseURL = 'https://alkoda-onair.com/'

# Langue par défaut du site (racine /)
languageCode = "fr-fr"
defaultContentLanguage = "fr"
disableDefaultLanguageRedirect = false

[Author]
  name = "Christophe Koclejda"
  email = "contact@alkoda-onair.com"

enableEmoji = true
ignoreErrors = ["additional-script-loading-error"]

# Taxonomy pour grouper les vidéos par thème (ex. "Gabriel Fauré")
[taxonomies]
  theme = "themes"

# Pages de thème (tags) sous /videos/[tag] au lieu de /themes/[tag]
[permalinks.term]
  themes = "/videos/:slug/"

[module]
  [[module.imports]]
    path = "github.com/alkoda/hugo-theme-alkoda"
    disable = false

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

# Shared params (can be overridden per language)
[params.browserconfig]
  TileColor = "#2d89ef"

[params]
  sitename = "Alkoda On Air"
  description = "Production"
  defaultColor = "dark"
  mainSections = ["posts"]
  toc = false
  tocOpen = false
  goToTop = true
  additionalScripts = ["js/custom.js"]
  dateFormat = ""
  rssFeedDescription = "summary"

[params.author]
  avatar = "avatar.jpg"
  intro = "Alkoda On Air"
  name = "Christophe Koclejda"
  description = "Production"

[[params.socialIcons]]
  name = "facebook"
  url = "https://www.facebook.com/alkodaonair/"

[[params.socialIcons]]
  name = "youtube"
  url = "https://www.youtube.com/channel/UC9B8N8SjG1Uls7P2-Gt8ZbA"

[[params.socialIcons]]
  name = "instagram"
  url = "http://www.instagram.com/alkodaonair/"

[[params.socialIcons]]
  name = "Rss"
  url = "/index.xml"

[params.webmanifest]
  name = "sitename"
  short_name = "sitename"
  start_url = "/"
  theme_color = "#434648"
  background_color = "#fff"
  display = "standalone"
  