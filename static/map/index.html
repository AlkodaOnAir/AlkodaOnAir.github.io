<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALKODA ON AIR — Signal Flow [VIEWER]</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;600;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');

:root {
  --bg:       #05070f;
  --bg2:      #080b17;
  --bg3:      #0c1020;
  --panel:    #0f1422;
  --border:   #1a2235;
  --border2:  #212d45;
  --accent:   #00d4ff;
  --accent2:  #ff6b35;
  --green:    #39ff14;
  --text:     #b8ccec;
  --textdim:  #4a5a7a;
  --textbr:   #ffffff;
  --mono:     'Share Tech Mono', monospace;
  --display:  'Orbitron', sans-serif;
  --body:     'Rajdhani', sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--body)}

/* ─── LOADING ─────────────────────────────── */
#loading{
  position:fixed;inset:0;background:var(--bg);z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .6s ease .2s;
}
#loading.done{opacity:0;pointer-events:none}
.ld-hex{
  width:80px;height:80px;margin-bottom:32px;
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  background:linear-gradient(135deg,var(--accent),#0066ff);
  animation:hex-pulse 2s ease-in-out infinite;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-size:20px;font-weight:900;color:#fff;
}
@keyframes hex-pulse{0%,100%{filter:drop-shadow(0 0 20px rgba(0,212,255,.8))}50%{filter:drop-shadow(0 0 50px rgba(0,212,255,.4))}}
.ld-title{font-family:var(--display);font-size:32px;font-weight:900;letter-spacing:10px;color:#fff;margin-bottom:6px}
.ld-sub{font-family:var(--mono);font-size:11px;letter-spacing:6px;color:var(--accent);margin-bottom:40px;text-transform:uppercase}
.ld-bar-wrap{width:320px;height:2px;background:var(--border);border-radius:1px;overflow:hidden;margin-bottom:16px}
.ld-bar{height:100%;width:0;background:linear-gradient(90deg,var(--accent),#0099ff);border-radius:1px;transition:width .3s ease;box-shadow:0 0 12px var(--accent)}
.ld-status{font-family:var(--mono);font-size:10px;color:var(--textdim);letter-spacing:2px;min-height:16px;transition:opacity .2s}

/* ─── LAYOUT ───────────────────────────────── */
#app{display:grid;grid-template-rows:52px 1fr 32px;grid-template-columns:200px 1fr 300px;height:100vh;width:100vw}

/* ─── HEADER ───────────────────────────────── */
#header{
  grid-column:1/-1;grid-row:1;
  background:linear-gradient(90deg,var(--bg2) 0%,#0a1128 50%,var(--bg2) 100%);
  border-bottom:1px solid var(--border2);
  display:flex;align-items:center;gap:16px;padding:0 20px;
  position:relative;z-index:50;
}
#header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,var(--accent) 30%,#0066ff 70%,transparent 100%);
  opacity:.5;
}
.h-logo{display:flex;align-items:center;gap:10px}
.h-hex{
  width:28px;height:28px;
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  background:var(--accent);animation:hex-pulse 3s ease-in-out infinite;
}
.h-name{font-family:var(--display);font-size:14px;font-weight:900;letter-spacing:4px;color:#fff}
.h-ver{font-family:var(--mono);font-size:9px;color:var(--accent);letter-spacing:3px}

.h-sep{width:1px;height:28px;background:var(--border2);margin:0 4px}

.h-oab{
  padding:3px 10px;background:#cc0000;color:#fff;
  font-family:var(--display);font-size:9px;font-weight:700;letter-spacing:3px;
  border-radius:2px;animation:oab 1.4s ease-in-out infinite;
  box-shadow:0 0 16px rgba(255,0,0,.5);
}
@keyframes oab{0%,100%{opacity:1}50%{opacity:.5}}

.h-search{
  position:relative;margin-left:8px;display:flex;align-items:center;gap:6px;
}
#search-input{
  background:var(--bg3);border:1px solid var(--border2);border-radius:4px;
  padding:5px 12px 5px 28px;font-family:var(--mono);font-size:11px;
  color:var(--text);width:200px;outline:none;transition:all .2s;
}
#search-input:focus{border-color:rgba(0,212,255,.4);background:rgba(0,212,255,.04);width:240px}
.h-search-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--textdim);font-size:14px;pointer-events:none}
#search-drop{
  position:absolute;top:calc(100% + 4px);left:0;min-width:240px;max-height:240px;
  overflow-y:auto;background:var(--panel);border:1px solid var(--border2);
  border-radius:4px;z-index:9999;display:none;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
}
#search-drop.open{display:block}
.sd-item{
  padding:7px 12px;font-family:var(--body);font-size:12px;color:var(--text);
  cursor:pointer;display:flex;align-items:center;gap:8px;
  border-bottom:1px solid rgba(255,255,255,.03);transition:background .1s;
}
.sd-item:hover,.sd-item.active{background:rgba(0,212,255,.1);color:#fff}
.sd-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.sd-cat{font-family:var(--mono);font-size:9px;color:var(--textdim);margin-left:auto}
/* ── Undo / Redo dans le header */
.h-ur{display:flex;gap:3px;align-items:center}
.h-ur-btn{
  background:var(--bg3);border:1px solid var(--border2);border-radius:3px;
  color:var(--textdim);font-family:var(--mono);font-size:11px;padding:4px 8px;
  cursor:pointer;transition:all .15s;opacity:.35;
}
.h-ur-btn:hover{background:var(--border2);color:var(--text)}
.h-ur-btn.active{opacity:1}

.h-stats{margin-left:auto;display:flex;gap:20px;align-items:center}
.h-stat{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--textdim)}
.h-dot{width:6px;height:6px;border-radius:50%;animation:stat-p 2s infinite}
@keyframes stat-p{0%,100%{opacity:1}50%{opacity:.3}}

/* ─── SIDEBAR LEFT ─────────────────────────── */
#sidebar-left{
  grid-column:1;grid-row:2;
  background:var(--bg2);border-right:1px solid var(--border);
  overflow-y:auto;display:flex;flex-direction:column;gap:0;
}
#sidebar-left::-webkit-scrollbar{width:3px}
#sidebar-left::-webkit-scrollbar-track{background:transparent}
#sidebar-left::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.sl-section{padding:14px 14px 10px;border-bottom:1px solid var(--border)}
.sl-title{font-family:var(--mono);font-size:8px;letter-spacing:3px;color:var(--textdim);text-transform:uppercase;margin-bottom:10px}

.f-btn{
  display:flex;align-items:center;gap:8px;width:100%;padding:6px 8px;
  background:transparent;border:1px solid transparent;border-radius:4px;
  cursor:pointer;margin-bottom:2px;transition:all .15s;text-align:left;
}
.f-btn:hover{background:rgba(255,255,255,.04);border-color:var(--border)}
.f-btn.active{background:rgba(0,212,255,.07);border-color:rgba(0,212,255,.25)}
.f-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.f-label{font-family:var(--body);font-size:12px;font-weight:600;color:var(--text)}
.f-count{margin-left:auto;font-family:var(--mono);font-size:9px;color:var(--textdim);background:var(--bg3);padding:1px 5px;border-radius:2px}

.c-btn{
  display:flex;align-items:center;gap:7px;width:100%;padding:5px 8px;
  background:transparent;border:1px solid transparent;border-radius:3px;
  cursor:pointer;margin-bottom:2px;transition:all .15s;
}
.c-btn:hover{background:rgba(255,255,255,.03)}
.c-btn.active{background:rgba(255,255,255,.04);border-color:var(--border)}
.c-line{width:22px;height:2px;border-radius:1px;flex-shrink:0}
.c-label{font-family:var(--mono);font-size:10px}

.sl-actions{padding:12px 14px;margin-top:auto}
.act-btn{
  display:flex;align-items:center;gap:7px;width:100%;padding:7px 10px;
  background:var(--bg3);border:1px solid var(--border);border-radius:4px;
  cursor:pointer;font-family:var(--mono);font-size:10px;color:var(--textdim);
  margin-bottom:4px;transition:all .15s;
}
.act-btn:hover{background:var(--border);color:var(--text)}

/* ─── CANVAS AREA ──────────────────────────── */
#canvas-area{
  grid-column:2;grid-row:2;
  position:relative;overflow:hidden;cursor:grab;
  background:var(--bg);
}
#canvas-area:active{cursor:grabbing}
#canvas-area::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(26,34,53,.35) 1px,transparent 1px),
    linear-gradient(90deg,rgba(26,34,53,.35) 1px,transparent 1px);
  background-size:50px 50px;z-index:0;
}
#canvas-area::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(ellipse at center,transparent 30%,rgba(5,7,15,.75) 100%);
}

#canvas-root{position:absolute;top:0;left:0;transform-origin:0 0;z-index:2}
#nodes-layer{position:relative;z-index:10}

/* SVG cables layer */
#cables-svg{position:absolute;top:0;left:0;overflow:visible;pointer-events:all;z-index:10;cursor:default}
#cables-svg .cp{cursor:default;transition:opacity .2s,stroke-width .2s;pointer-events:stroke;}
#cables-svg .cp:hover{stroke-width:5px!important;opacity:1!important}
#cables-svg .anchor-handle{transition:filter .15s}
#cables-svg .anchor-handle:hover{filter:brightness(1.5)}

/* Nodes */
.node{position:absolute;cursor:url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCIgdmlld0JveD0iMCAwIDIwIDIwIj4KICA8cGF0aCBkPSJNMTAgMSBMOCA0IEw5LjUgNCBMOS41IDkuNSBMNCA5LjUgTDQgOCBMMSAxMCBMNCAxMiBMNCAxMC41IEw5LjUgMTAuNSBMOS41IDE2IEw4IDE2IEwxMCAxOSBMMTIgMTYgTDEwLjUgMTYgTDEwLjUgMTAuNSBMMTYgMTAuNSBMMTYgMTIgTDE5IDEwIEwxNiA4IEwxNiA5LjUgTDEwLjUgOS41IEwxMC41IDQgTDEyIDQgWiIgZmlsbD0id2hpdGUiIHN0cm9rZT0iYmxhY2siIHN0cm9rZS13aWR0aD0iMC44Ii8+Cjwvc3ZnPg==') 10 10, move;user-select:none;-webkit-user-drag:none}
.node-box{
  border:1px solid var(--border2);border-radius:5px;overflow:hidden;
  background:transparent;transition:all .2s ease;
  box-shadow:0 3px 16px rgba(0,0,0,.5);
}
.node:hover .node-box{
  border-color:rgba(255,255,255,.2);
  box-shadow:0 6px 28px rgba(0,0,0,.7),0 0 16px rgba(0,212,255,.08);
  transform:translateY(-2px);
}
.node.sel .node-box{
  border-color:var(--accent);
  box-shadow:0 0 0 2px rgba(0,212,255,.25),0 8px 40px rgba(0,0,0,.8),0 0 30px rgba(0,212,255,.12);
}
.node.lit .node-box{border-color:rgba(255,200,0,.5);box-shadow:0 0 0 1px rgba(255,200,0,.15),0 6px 24px rgba(0,0,0,.7)}
.node.dim .node-box{opacity:.12;transform:none}
.node-catbar{height:3px;width:100%}
.node-img-wrap{display:flex;align-items:center;justify-content:center;overflow:hidden;background:transparent}
.node-img-wrap img{object-fit: cover;width:100%;height:100%;padding:3px;-webkit-user-drag:none;user-drag:none;pointer-events:none}
/* ── Resize handles */
.rh{
  position:absolute;z-index:20;background:var(--accent);border:1px solid #fff;
  border-radius:2px;opacity:.9;transition:opacity .1s;
}
.rh:hover{opacity:1;box-shadow:0 0 6px var(--accent)}
.rh-n,.rh-s{left:50%;transform:translateX(-50%);width:30px;height:6px;cursor:ns-resize}
.rh-w,.rh-e{top:50%;transform:translateY(-50%);width:6px;height:30px;cursor:ew-resize}
.rh-nw,.rh-ne,.rh-sw,.rh-se{width:10px;height:10px;cursor:nwse-resize}
.rh-ne,.rh-se{cursor:nesw-resize}
.rh-n{top:-4px}.rh-s{bottom:-4px}.rh-w{left:-4px}.rh-e{right:-4px}
.rh-nw{top:-4px;left:-4px}.rh-ne{top:-4px;right:-4px}
.rh-sw{bottom:-4px;left:-4px}.rh-se{bottom:-4px;right:-4px}

.node-lbl{
  position:absolute;bottom:-19px;left:50%;transform:translateX(-50%);
  white-space:nowrap;font-family:var(--mono);font-size:8px;color:var(--textdim);
  pointer-events:none;letter-spacing:.5px;text-shadow:0 1px 4px rgba(0,0,0,.9);
  transition:color .2s;
}
.node.sel .node-lbl,.node.lit .node-lbl{color:var(--text)}

/* Zone labels */
.zone-lbl{
  position:absolute;font-family:var(--display);font-size:9px;
  letter-spacing:6px;text-transform:uppercase;color:rgba(255,255,255,.04);
  pointer-events:none;user-select:none;font-weight:700;
}

/* Minimap */
#minimap{
  position:absolute;bottom:8px;left:8px;z-index:20;
  width:160px;height:90px;border:1px solid var(--border2);border-radius:4px;
  overflow:hidden;background:rgba(8,11,23,.9);cursor:pointer;
}
#minimap canvas{width:100%;height:100%;display:block}

/* Corners */
.corner{position:absolute;width:20px;height:20px;pointer-events:none;z-index:3}
.corner.tl{top:8px;left:8px;border-top:1px solid rgba(0,212,255,.2);border-left:1px solid rgba(0,212,255,.2)}
.corner.tr{top:8px;right:8px;border-top:1px solid rgba(0,212,255,.2);border-right:1px solid rgba(0,212,255,.2)}
.corner.bl{bottom:42px;left:8px;border-bottom:1px solid rgba(0,212,255,.2);border-left:1px solid rgba(0,212,255,.2)}
.corner.br{bottom:42px;right:8px;border-bottom:1px solid rgba(0,212,255,.2);border-right:1px solid rgba(0,212,255,.2)}

/* ─── INFO PANEL RIGHT ─────────────────────── */
#info-panel{
  grid-column:3;grid-row:2;
  background:var(--bg2);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.16,1,.3,1);
}
#info-panel.open{transform:translateX(0)}

.ip-header{padding:18px 18px 14px;border-bottom:1px solid var(--border);position:relative;flex-shrink:0}
.ip-badge{
  display:inline-block;font-family:var(--mono);font-size:8px;letter-spacing:3px;
  text-transform:uppercase;padding:3px 8px;border-radius:2px;margin-bottom:8px;
}
.ip-name{font-family:var(--display);font-size:14px;font-weight:700;color:#fff;letter-spacing:1px;line-height:1.3}
.ip-close{
  position:absolute;top:14px;right:14px;width:22px;height:22px;
  background:transparent;border:1px solid var(--border2);border-radius:3px;
  cursor:pointer;color:var(--textdim);font-size:12px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.ip-close:hover{background:rgba(255,255,255,.08);color:var(--text)}

.ip-img{margin:14px 18px;height:130px;border-radius:5px;overflow:hidden;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ip-img img{max-width:100%;max-height:100%;object-fit: cover;padding:6px}

.ip-desc{padding:0 18px 14px;font-family:var(--body);font-size:13px;line-height:1.6;color:var(--text);border-bottom:1px solid var(--border);flex-shrink:0;white-space:pre-line}

.ip-conns{padding:14px 18px;overflow-y:auto;flex:1}
.ip-conns::-webkit-scrollbar{width:3px}
.ip-conns::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── MODE SIGNAL ─────────────────────────────── */
#info-panel.signal-mode .ip-img{display:none}
#info-panel.signal-mode .ip-conn-title{display:none}
.ip-conn-title{font-family:var(--mono);font-size:8px;letter-spacing:3px;color:var(--textdim);text-transform:uppercase;margin-bottom:10px}
.ip-conn-item{
  display:flex;align-items:center;gap:8px;padding:7px 0;
  border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:all .12s;
}
.ip-conn-item:hover{padding-left:4px}
.ip-conn-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.ip-conn-name{font-family:var(--body);font-size:12px;font-weight:600;color:var(--text);flex:1}
.ip-conn-type{font-family:var(--mono);font-size:9px;padding:2px 6px;background:var(--bg3);border-radius:2px}

/* ─── BOTTOM BAR ───────────────────────────── */
#bottom-bar{
  grid-column:1/-1;grid-row:3;
  background:var(--bg2);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:16px;
  font-family:var(--mono);font-size:10px;color:var(--textdim);
}
.bb-sep{width:1px;height:14px;background:var(--border)}
.bb-info{flex:1;color:var(--text)}
.zoom-ctrl{display:flex;align-items:center;gap:5px;margin-left:auto}
.zoom-btn{
  width:22px;height:22px;background:var(--bg3);border:1px solid var(--border2);
  border-radius:3px;cursor:pointer;color:var(--text);
  display:flex;align-items:center;justify-content:center;font-size:13px;
  transition:all .12s;font-family:var(--mono);
}
.zoom-btn:hover{background:var(--border2)}
#zoom-val{font-family:var(--mono);font-size:10px;color:var(--textdim);min-width:38px;text-align:center}

/* ─── TOOLTIP ──────────────────────────────── */
#tt{
  position:fixed;background:var(--panel);border:1px solid var(--border2);
  border-radius:5px;padding:10px 13px;pointer-events:none;z-index:500;
  display:none;max-width:220px;box-shadow:0 8px 30px rgba(0,0,0,.6);
}
.tt-name{font-family:var(--display);font-size:11px;font-weight:700;color:#fff;margin-bottom:4px;letter-spacing:.5px}
.tt-cat{font-family:var(--mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.tt-info{font-family:var(--mono);font-size:9px;color:var(--textdim)}

/* ─── CABLE TOOLTIP ────────────────────────── */
#ctt{position:fixed;background:rgba(10,13,22,.95);border:1px solid var(--border2);border-radius:3px;padding:5px 10px;pointer-events:none;z-index:501;display:none;font-family:var(--mono);font-size:10px}

/* ─── SCANLINES ────────────────────────────── */
#scanlines{
  position:fixed;inset:0;pointer-events:none;z-index:1000;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);
}

/* ─── KEYBOARD HINTS ───────────────────────── */
#kbd-hints{
  position:absolute;bottom:8px;right:8px;z-index:20;
  display:flex;gap:6px;flex-direction:column;align-items:flex-end;
}
.kbd-hint{font-family:var(--mono);font-size:8px;color:var(--textdim);letter-spacing:.5px}
kbd{background:var(--bg3);border:1px solid var(--border2);border-radius:2px;padding:1px 4px;font-family:var(--mono);font-size:8px;color:var(--textdim)}

.node{cursor:pointer!important}
.rh{display:none!important}
</style>
</head>
<body>
<div id="loading">
  <div class="ld-hex">⬡</div>
  <div class="ld-title">ALKODA</div>
  <div class="ld-sub">Signal Flow — Viewer</div>
  <div class="ld-bar-wrap"><div class="ld-bar" id="ld-bar"></div></div>
  <div class="ld-status" id="ld-status">LOADING...</div>
</div>
<div id="app">
  <header id="header">
    <div class="h-logo">
      <div class="h-hex"></div>
      <div><div class="h-name">ALKODA ON AIR</div><div class="h-ver">BROADCAST SYSTEM · SIGNAL MAP</div></div>
    </div>
    <div class="h-sep"></div>
    <div class="h-oab">● ON AIR</div>
    <div style="margin-left:8px;padding:3px 10px;background:#0c1020;color:#4a5a7a;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;border-radius:2px;border:1px solid #1a2235;">VIEW ONLY</div>
    <div class="h-stats">
      <div class="h-stat"><div class="h-dot" style="background:#4caf50"></div> ATEM ONLINE</div>
      <div class="h-stat"><div class="h-dot" style="background:#4caf50"></div> RÉSEAU OK</div>
      <div class="h-stat"><div class="h-dot" style="background:#ffc000"></div> 31 APPAREILS · 56 CONNEXIONS</div>
    </div>
  </header>
  <aside id="sidebar-left">
    <div class="sl-section">

function toSVG(pts){
  if(pts.length<2)return'';
  const R=10;
  if(pts.length===2)return`M${pts[0][0]} ${pts[0][1]} L${pts[1][0]} ${pts[1][1]}`;
  let d=`M${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`;
  for(let i=1;i<pts.length-1;i++){
    const [px,py]=pts[i-1],[cx,cy]=pts[i],[nx,ny]=pts[i+1];
    const l1=Math.hypot(cx-px,cy-py),l2=Math.hypot(nx-cx,ny-cy);
    const r=Math.min(R,l1/2,l2/2);
    const dx1=(cx-px)/l1*r,dy1=(cy-py)/l1*r;
    const dx2=(nx-cx)/l2*r,dy2=(ny-cy)/l2*r;
    d+=` L${(cx-dx1).toFixed(1)} ${(cy-dy1).toFixed(1)} Q${cx} ${cy} ${(cx+dx2).toFixed(1)} ${(cy+dy2).toFixed(1)}`;
  }
  d+=` L${pts[pts.length-1][0].toFixed(1)} ${pts[pts.length-1][1].toFixed(1)}`;
  return d;
}

  badge.textContent=c.type;
  badge.style.cssText=`background:${c.color}22;color:${c.color};border:1px solid ${c.color}44`;
  document.getElementById('ip-name').textContent=`${sa.name}  ↔  ${sb.name}`;
  document.getElementById('ip-img').src='';
  document.getElementById('ip-desc').textContent=`Signal : ${c.type}\nSource  : ${sa.name}\nDest.   : ${sb.name}`;
  const list=document.getElementById('ip-conn-list');
  list.innerHTML=`
    <div class="ip-conn-item" onclick="selectNode('${c.from}')">
      <div class="ip-conn-dot" style="background:${c.color}"></div>
      <div class="ip-conn-name">${sa.name}</div>
      <div class="ip-conn-type" style="color:${c.color}">SOURCE</div>
    </div>
    <div style="padding:6px 8px;font-family:var(--mono);font-size:9px;color:var(--textdim);text-align:center;letter-spacing:2px;border-bottom:1px solid rgba(255,255,255,.04)">── ${c.type} ──</div>
    <div class="ip-conn-item" onclick="selectNode('${c.to}')">
      <div class="ip-conn-dot" style="background:${c.color}"></div>
      <div class="ip-conn-name">${sb.name}</div>
      <div class="ip-conn-type" style="color:${c.color}">DEST.</div>
    </div>`;
  document.querySelectorAll('.node').forEach(n=>{
    const nid=n.id.replace('n-','');
    n.classList.remove('sel','lit','dim');
    if(nid===c.from||nid===c.to)n.classList.add('lit');
    else n.classList.add('dim');
  });
  document.querySelectorAll('.cp').forEach(p=>{
    const cid=parseInt(p.getAttribute('data-cid'));
    if(cid===c.id){p.setAttribute('opacity','0.95');p.setAttribute('stroke-width','4.5');p.setAttribute('filter','url(#glow)');}
    else{p.setAttribute('opacity','0.05');p.setAttribute('stroke-width','1');p.removeAttribute('filter');}
  });
  document.getElementById('bb-info').textContent=`◈ ${c.type}  —  ${sa.name} ↔ ${sb.name}`;
  infoP.classList.add('open');
}
function renderNodes(){
  Object.values(SH).forEach(s=>{
    const node=document.createElement('div');
    node.className='node';node.id='n-'+s.id;
    node.style.cssText=`left:${s.x}px;top:${s.y}px;width:${s.w}px;height:${s.h+22}px;z-index:${s.zindex||1};cursor:pointer`;
    const box=document.createElement('div');
    box.className='node-box';box.style.width=s.w+'px';box.style.height=s.h+'px';
    const wrap=document.createElement('div');
    wrap.className='node-img-wrap';
    wrap.style.cssText=`width:${s.w}px;height:${s.h-3}px`;
    if(s.img){
      const img=document.createElement('img');
      img.src=s.img;img.alt=s.name;
      img.style.cssText=`width:${s.w}px;height:${s.h-3}px`;
      if(s.id==='25'){img.style.objectFit='fill';img.style.padding='0';}
      if(s.id==='63'||s.id==='22')img.style.objectPosition='top';
      wrap.append(img);
    }
    box.append(wrap);node.append(box);
    const lbl=document.createElement('div');
    lbl.className='node-lbl';lbl.textContent=s.short||s.name;
    node.append(lbl);
    node.addEventListener('mouseenter',e=>showTT(e,s));
    node.addEventListener('mousemove',e=>moveTT(e));
    node.addEventListener('mouseleave',()=>hideTT());
    node.addEventListener('click',e=>{e.stopPropagation();selectNode(s.id);});
    nodesL.append(node);
  });
}
function selectNode(id){
  if(selId===id){clearSel();return;}
  selId=id;
  const s=SH[id];if(!s)return;
  const conns=CM[id]||[];
  const litSet=new Set(conns.map(c=>c.sid));
  const cabSet=new Set(conns.map(c=>c.cid));
  document.querySelectorAll('.node').forEach(n=>{
    const nid=n.id.replace('n-','');
    n.classList.remove('sel','lit','dim');
    if(nid===id)n.classList.add('sel');
    else if(litSet.has(nid))n.classList.add('lit');
    else n.classList.add('dim');
  });
  document.querySelectorAll('.cp').forEach(p=>{
    const cid=parseInt(p.getAttribute('data-cid'));
    if(cabSet.has(cid)){
      p.setAttribute('opacity','0.95');p.setAttribute('stroke-width','3.5');p.setAttribute('filter','url(#glow)');
    }else{
      p.setAttribute('opacity','0.05');p.setAttribute('stroke-width','1');p.removeAttribute('filter');
    }
  });
  showPanel(s,conns);
  document.getElementById('bb-info').textContent=`▶ ${s.name}  —  ${conns.length} connexion${conns.length>1?'s':''}`;
}
function clearSel(){
  selId=null;
  infoP.classList.remove('signal-mode');
  document.querySelectorAll('.node').forEach(n=>n.classList.remove('sel','lit','dim'));
  document.querySelectorAll('.cp').forEach(p=>{
    p.removeAttribute('filter');
    const t=p.getAttribute('data-type');
    p.setAttribute('opacity',(activeCable==='all'||t===activeCable)?'0.85':'0.05');
    p.setAttribute('stroke-width','3.5');
  });
  document.getElementById('bb-info').textContent='Cliquez sur un équipement pour voir ses connexions';
  applyFilters();
}
function showPanel(s,conns){
  const cat=CAT[s.cat]||{label:s.cat,color:'#888'};
  const badge=document.getElementById('ip-badge');
  badge.textContent=cat.label.toUpperCase();
  badge.style.cssText=`background:${cat.color}22;color:${cat.color};border:1px solid ${cat.color}44`;
  document.getElementById('ip-name').textContent=s.name;
  document.getElementById('ip-img').src=s.img;
  document.getElementById('ip-desc').textContent=s.desc;
  const list=document.getElementById('ip-conn-list');
  list.innerHTML='';
  conns.forEach(c=>{
    const other=SH[c.sid];if(!other)return;
    const item=document.createElement('div');
    item.className='ip-conn-item';item.onclick=()=>selectNode(c.sid);
    item.innerHTML=`<div class="ip-conn-dot" style="background:${c.color}"></div><div class="ip-conn-name">${other.name}</div><div class="ip-conn-type" style="color:${c.color}">${c.type}</div>`;
    list.append(item);
  });
  infoP.classList.add('open');
}
function closePanel(){infoP.classList.remove('open','signal-mode');clearSel();}
function fCat(cat,btn){
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');activeCat=cat;applyFilters();
}
function fCable(type,btn){
  document.querySelectorAll('.c-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');activeCable=type;applyFilters();
}
function applyFilters(){
  if(selId)return;
  Object.values(SH).forEach(s=>{
    const node=document.getElementById('n-'+s.id);if(!node)return;
    const vis=activeCat==='all'||s.cat===activeCat;
    node.style.opacity=vis?'1':'0.06';
    node.style.pointerEvents=vis?'auto':'none';
  });
  document.querySelectorAll('.cp').forEach(p=>{
    const t=p.getAttribute('data-type');
    p.setAttribute('opacity',(activeCable==='all'||t===activeCable)?'0.85':'0.03');
  });
}
function showTT(e,s){
  const cat=CAT[s.cat]||{label:s.cat,color:'#888'};
  const n=CM[s.id]?.length||0;
  document.getElementById('tt-n').textContent=s.name;
  const ttc=document.getElementById('tt-c');
  ttc.textContent=cat.label.toUpperCase();ttc.style.color=cat.color;
  document.getElementById('tt-i').textContent=`${n} connexion${n>1?'s':''}`;
  tt.style.display='block';moveTT(e);
}
function moveTT(e){tt.style.left=Math.min(e.clientX+14,window.innerWidth-240)+'px';tt.style.top=Math.max(e.clientY-10,4)+'px';}
function hideTT(){tt.style.display='none';}
function applyT(){
  root.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
  document.getElementById('zoom-val').textContent=Math.round(zoom*100)+'%';
  drawMinimap();
}
function fitView(){
  const ww=area.clientWidth,wh=area.clientHeight;
  const sx=ww/CW,sy=wh/CH;
  zoom=Math.min(sx,sy)*.92;
  panX=(ww-CW*zoom)/2;panY=(wh-CH*zoom)/2;
  applyT();
}
function resetView(){fitView();clearSel();closePanel();}
function dz(d){
  const ww=area.clientWidth,wh=area.clientHeight;
  const nz=Math.max(.15,Math.min(4,zoom+d));
  const sc=nz/zoom;
  panX=ww/2-sc*(ww/2-panX);panY=wh/2-sc*(wh/2-panY);
  zoom=nz;applyT();
}
function drawMinimap(){
  const mc=document.getElementById('mm-canvas');
  const ctx=mc.getContext('2d');
  ctx.clearRect(0,0,160,90);
  const sx=160/CW,sy=90/CH;
  CA.forEach(c=>{
    const pts=ROUTES[c.id];if(!pts||pts.length<2)return;
    ctx.beginPath();ctx.moveTo(pts[0][0]*sx,pts[0][1]*sy);
    for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0]*sx,pts[i][1]*sy);
    ctx.strokeStyle=c.color+'66';ctx.lineWidth=.6;ctx.stroke();
  });
  Object.values(SH).forEach(s=>{
    ctx.fillStyle=(CAT[s.cat]?.color||'#888')+'cc';
    ctx.fillRect(s.x*sx,s.y*sy,Math.max(s.w*sx,2.5),Math.max(s.h*sy,2.5));
  });
  const vx=-panX/zoom*sx,vy=-panY/zoom*sy;
  const vw=area.clientWidth/zoom*sx,vh=area.clientHeight/zoom*sy;
  ctx.strokeStyle='rgba(0,212,255,.7)';ctx.lineWidth=1;ctx.strokeRect(vx,vy,vw,vh);
}
function setupEvents(){
  area.addEventListener('mousedown',e=>{if(e.button!==0)return;drag=true;lmx=e.clientX;lmy=e.clientY;});
  window.addEventListener('mousemove',e=>{if(!drag)return;panX+=e.clientX-lmx;panY+=e.clientY-lmy;lmx=e.clientX;lmy=e.clientY;applyT();});
  window.addEventListener('mouseup',()=>{drag=false;});
  area.addEventListener('wheel',e=>{
    e.preventDefault();
    const r=area.getBoundingClientRect();
    const mx=e.clientX-r.left,my=e.clientY-r.top;
    const nd=e.deltaY<0?0.1:-0.1;
    const nz=Math.max(.15,Math.min(4,zoom+nd));
    panX=mx-(mx-panX)*(nz/zoom);panY=my-(my-panY)*(nz/zoom);
    zoom=nz;applyT();
  },{passive:false});
  area.addEventListener('click',e=>{if(e.target===area||e.target===svg){clearSel();closePanel();}});
  svg.addEventListener('pointerdown',e=>{if(e.target===svg){drag=true;lmx=e.clientX;lmy=e.clientY;}});
  document.getElementById('mm-canvas').addEventListener('click',e=>{
    const r=e.target.getBoundingClientRect();
    const mx=(e.clientX-r.left)/r.width,my=(e.clientY-r.top)/r.height;
    panX=area.clientWidth/2-mx*CW*zoom;panY=area.clientHeight/2-my*CH*zoom;applyT();
  });
}
window.addEventListener('DOMContentLoaded',()=>{
  root.style.width=CW+'px';root.style.height=CH+'px';
  svg.setAttribute('width',CW);svg.setAttribute('height',CH);
  svg.style.width=CW+'px';svg.style.height=CH+'px';
  buildCM();renderZones();renderCables();renderNodes();setupEvents();
  setTimeout(()=>{fitView();drawMinimap();},100);
  const ldMsgs=[[0,'LOADING SIGNAL MAP...'],[30,'PARSING DEVICES...'],[65,'DRAWING CABLES...'],[100,'READY']];
  let ldIdx=0;
  const ldBar=document.getElementById('ld-bar'),ldStat=document.getElementById('ld-status');
  function ldStep(){
    if(ldIdx>=ldMsgs.length)return;
    const [pct,msg]=ldMsgs[ldIdx++];
    ldBar.style.width=pct+'%';ldStat.textContent=msg;
    if(ldIdx<ldMsgs.length)setTimeout(ldStep,280);
    else setTimeout(()=>document.getElementById('loading').classList.add('done'),350);
  }
  setTimeout(ldStep,200);
});
window.addEventListener('keydown',e=>{
  if(e.key==='Escape'){clearSel();closePanel();}
  if(e.key==='f'||e.key==='F')resetView();
  if(e.key==='+'||e.key==='=')dz(.15);
  if(e.key==='-')dz(-.15);
});
window.addEventListener('resize',fitView);
</script>
</body>
</html>
